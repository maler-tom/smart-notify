blueprint:
  name: "📱 Smart Device Finished – State Based"
  description: >
    **Gerät fertig → Intelligente Benachrichtigungen & Licht**

    Erkennt Zustandswechsel (ON/OFF) und benachrichtigt automatisch:
    - Jemand zuhause → Sofortige Benachrichtigung
    - Niemand zuhause → Benachrichtigung wird gespeichert & später gesendet

    💡 Optionale Licht-Integration mit Farbkreis und Auto-Aus
    🔄 Funktioniert mit Switch, Sensor und Binary Sensor

  domain: automation
  source_url: https://github.com/maler-tom/ha-smart-blueprints

  input:
    #################################################
    # SOSBALD - ZUSTAND TRIGGER
    #################################################
    trigger_entity:
      name: "📱 Gerät / Sensor"
      description: "Switch / Binary Sensor / Sensor / Light"
      selector:
        entity:
          filter:
            - domain: [switch, binary_sensor, sensor, light]

    trigger_from_state:
      name: "🔄 Von Zustand"
      default: "on"
      selector:
        select:
          options:
            - label: "on"
              value: "on"
            - label: "off"
              value: "off"
            - label: "toggle"
              value: "toggle"

    trigger_to_state:
      name: "🎯 Zu Zustand"
      default: "off"
      selector:
        select:
          options:
            - label: "on"
              value: "on"
            - label: "off"
              value: "off"

    trigger_delay_minutes:
      name: "⏱️ Verzögerung (Minuten)"
      default: 0
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: "min"
          mode: slider

    trigger_delay_seconds:
      name: "⏱️ Verzögerung (Sekunden)"
      default: 0
      selector:
        number:
          min: 0
          max: 59
          unit_of_measurement: "sec"
          mode: slider

    #################################################
    # LICHT-INTEGRATION
    #################################################
    enable_light:
      name: "💡 Licht aktivieren"
      description: "Licht bei Benachrichtigung einschalten?"
      default: false
      selector:
        boolean:

    light_entity:
      name: "💡 Licht Entity"
      description: "Welches Licht soll einschalten?"
      default: ""
      selector:
        entity:
          domain: light

    light_color:
      name: "🌈 Licht-Farbe"
      default: [255, 100, 0]
      selector:
        color_rgb:

    light_brightness:
      name: "☀️ Helligkeit (%)"
      default: 100
      selector:
        number:
          min: 10
          max: 100
          unit_of_measurement: "%"
          mode: slider

    light_duration_minutes:
      name: "⏱️ Licht Dauer (Minuten)"
      description: "0 = bleibt an"
      default: 0
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: "min"
          mode: slider

    #################################################
    # BENACHRICHTIGUNG
    #################################################
    notification_actions:
      name: "🔔 Benachrichtigungen"
      description: "Was soll bei Trigger passieren"
      selector:
        action: {}

#################################################
# TRIGGER
#################################################
trigger:
  - platform: state
    entity_id: !input trigger_entity
    from: !input trigger_from_state
    to: !input trigger_to_state
    for:
      minutes: !input trigger_delay_minutes
      seconds: !input trigger_delay_seconds

#################################################
# CONDITIONS
#################################################
condition: []

#################################################
# ACTIONS
#################################################
action:
  # Variablen einlesen
  - variables:
      use_light: !input enable_light
      light: !input light_entity
      light_duration: !input light_duration_minutes

  # Licht einschalten
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_light and light != '' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light }}"
            data:
              rgb_color: !input light_color
              brightness_pct: !input light_brightness
              transition: 1

  # Benachrichtigungen
  - choose: []
    default: !input notification_actions

  # Licht Auto-Aus
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_light and light != '' and light_duration | int(0) > 0 }}"
        sequence:
          - delay:
              minutes: "{{ light_duration }}"
          - service: light.turn_off
            target:
              entity_id: "{{ light }}"
            data:
              transition: 2

mode: restart
max_exceeded: silent
