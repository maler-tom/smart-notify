#################################################
# Pending Notifications speichern
#################################################

append_pending_notification:
  alias: Append pending notification
  icon: mdi:notification-clear-all
  mode: parallel
  max: 10

  fields:
    title:
      name: Title
      description: Notification title
      required: true
    message:
      name: Message
      description: Notification message
      required: true

  sequence:
    - variables:
        appending_notification:
          title: "{{ title | default('', true) }}"
          message: "{{ message | default('', true) }}"
          timestamp: "{{ now() }}"
        pending_notifications: >
          {{
            (
              state_attr(
                'sensor.pending_notification_sensor',
                'list'
              ) | default([], true)
            )
            + [appending_notification]
          }}

    - event: set_entity_value
      event_data:
        entity_id: sensor.pending_notification_sensor
        state: "{{ pending_notifications | length }}"
        attr:
          list: "{{ pending_notifications }}"

#################################################
# Person 1 Benachrichtigung
# ANPASSEN: notify.mobile_app_DEIN_HANDY
# ANPASSEN: notify.alexa_media_DEIN_ECHO
#################################################

notify_me:
  alias: Notify Me
  icon: mdi:notification-clear-all
  mode: parallel
  max: 10

  fields:
    title:
      name: Title
      required: true
    message:
      name: Message
      required: true

  sequence:
    - service: notify.mobile_app_DEIN_HANDY          # ⚠️ ANPASSEN
      data:
        title: "{{ title }}"
        message: "{{ message }}"

    - service: notify.alexa_media_DEIN_ECHO          # ⚠️ ANPASSEN
      data:
        message: "{{ message }}"

