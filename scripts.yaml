#################################################
# Notification Verteiler
# ANPASSEN: person.PERSON_1
# ANPASSEN: person.PERSON_2
# ANPASSEN: person.PERSON_3
#################################################

notify_those_at_home:
  alias: Notify people at home
  icon: mdi:notification-clear-all
  mode: parallel
  max: 10

  fields:
    title:
      name: Title
      required: true
      default: "Home Assistant"
    message:
      name: Message
      required: true
      default: "Neue Benachrichtigung"

  sequence:
    - choose:
        # Person 1 zuhause
        - conditions:
            - condition: state
              entity_id: person.PERSON_1              # ⚠️ ANPASSEN
              state: "home"
          sequence:
            - service: script.notify_me
              data:
                title: "{{ title }}"
                message: "{{ message }}"

        # Person 2 zuhause (optional)
        - conditions:
            - condition: state
              entity_id: person.PERSON_2              # ⚠️ ANPASSEN
              state: "home"
          sequence:
            - service: script.notify_wife
              data:
                title: "{{ title }}"
                message: "{{ message }}"

        # Person 3 zuhause (optional)
        - conditions:
            - condition: state
              entity_id: person.PERSON_3              # ⚠️ ANPASSEN
              state: "home"
          sequence:
            - service: script.notify_valentina
              data:
                title: "{{ title }}"
                message: "{{ message }}"

      # Niemand zuhause → speichern
      default:
        - service: script.append_pending_notification
          data:
            title: "{{ title }}"
            message: "{{ message }}"#################################################
