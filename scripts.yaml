#################################################
# Notification Verteiler
# ANPASSEN: person.PERSON_1
# ANPASSEN: person.PERSON_2
# ANPASSEN: person.PERSON_3 (optional)
#################################################

notify_those_at_home:
  alias: Notify people at home
  icon: mdi:notification-clear-all
  mode: parallel
  max: 10

  fields:
    title:
      name: Title
      required: true
      default: "Home Assistant"
    message:
      name: Message
      required: true
      default: "Neue Benachrichtigung"
    data:
      name: Data
      description: Additional notification data (optional)
      required: false
      default: {}
    notify_when_away:
      name: Notify when away
      description: >
        Wenn false: Nachricht wird NICHT gespeichert wenn niemand zuhause ist.
        Verhindert Endlosschleife beim Absenden von gespeicherten Nachrichten.
      required: false
      default: true

  sequence:
    - choose:
        # Person 1 zuhause
        - conditions:
            - condition: state
              entity_id: person.PERSON_1              # ⚠️ ANPASSEN
              state: "home"
          sequence:
            - action: script.notify_me
              data:
                title: "{{ title }}"
                message: "{{ message }}"
                data: "{{ data | default({}) }}"

        # Person 2 zuhause (optional)
        - conditions:
            - condition: state
              entity_id: person.PERSON_2              # ⚠️ ANPASSEN
              state: "home"
          sequence:
            - action: script.notify_wife
              data:
                title: "{{ title }}"
                message: "{{ message }}"
                data: "{{ data | default({}) }}"

        # Person 3 zuhause (optional)
        - conditions:
            - condition: state
              entity_id: person.PERSON_3              # ⚠️ ANPASSEN (optional)
              state: "home"
          sequence:
            - action: script.notify_valentina
              data:
                title: "{{ title }}"
                message: "{{ message }}"
                data: "{{ data | default({}) }}"

      # Niemand zuhause → nur speichern wenn notify_when_away true
      default:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ notify_when_away | default(true) }}"
              sequence:
                - action: script.append_pending_notification
                  data:
                    title: "{{ title }}"
                    message: "{{ message }}"
                    data: "{{ data | default({}) }}"
