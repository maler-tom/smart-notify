blueprint:
  name: "⚡ Smart Device Finished – Power Based"
  description: >
    **Waschmaschine/Spülmaschine fertig via Stromverbrauch**

    Erkennt Gerät-Start & Ende automatisch über Watt-Sensor:
    - Jemand zuhause → Sofortige Benachrichtigung
    - Niemand zuhause → Benachrichtigung wird gespeichert & später gesendet

    💡 Optionale Licht-Integration - einfach Licht auswählen
    ⚡ Funktioniert mit Sonoff, Shelly, TP-Link und anderen Smart Plugs

  domain: automation
  source_url: https://github.com/maler-tom/ha-smart-blueprints

  input:
    #################################################
    # SOSBALD - POWER SENSOR
    #################################################
    power_sensor:
      name: "⚡ Power Sensor"
      description: "Stromverbrauch in Watt (Sonoff, Shelly, etc.)"
      selector:
        entity:
          domain: sensor
          device_class: power

    starting_threshold:
      name: "⚡ Start-Schwelle (Watt)"
      description: "Ab wieviel Watt startet das Gerät?"
      default: 5
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "W"
          mode: slider
          step: 1

    starting_hysteresis:
      name: "⏱️ Start-Hysterese (Minuten)"
      description: "Wie lange über der Schwelle?"
      default: 1
      selector:
        number:
          min: 0.25
          max: 60
          unit_of_measurement: "min"
          mode: slider
          step: 0.25

    finishing_threshold:
      name: "⚡ End-Schwelle (Watt)"
      description: "Unter wieviel Watt ist das Gerät fertig?"
      default: 5
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "W"
          mode: slider
          step: 1

    finishing_hysteresis:
      name: "⏱️ End-Hysterese (Minuten)"
      description: "Wie lange unter der Schwelle?"
      default: 5
      selector:
        number:
          min: 0.25
          max: 60
          unit_of_measurement: "min"
          mode: slider
          step: 0.25

    #################################################
    # LICHT-INTEGRATION
    #################################################
    light_entity:
      name: "💡 Licht Entity"
      description: "Licht auswählen (leer lassen = kein Licht)"
      default: ""
      selector:
        entity:
          domain: light

    light_color:
      name: "🌈 Licht-Farbe"
      default: [255, 100, 0]
      selector:
        color_rgb:

    light_brightness:
      name: "☀️ Helligkeit (%)"
      default: 100
      selector:
        number:
          min: 10
          max: 100
          unit_of_measurement: "%"
          mode: slider

    light_duration_minutes:
      name: "⏱️ Licht Dauer (Minuten)"
      description: "0 = bleibt an"
      default: 0
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: "min"
          mode: slider

    #################################################
    # BENACHRICHTIGUNG
    #################################################
    notification_actions:
      name: "🔔 Benachrichtigungen"
      description: "Was soll bei Trigger passieren"
      selector:
        action: {}

#################################################
# TRIGGER
#################################################
trigger:
  - platform: numeric_state
    entity_id: !input power_sensor
    above: !input starting_threshold
    for:
      minutes: !input starting_hysteresis

#################################################
# CONDITIONS
#################################################
condition: []

#################################################
# ACTIONS
#################################################
action:
  # Warte bis Gerät fertig ist
  - wait_for_trigger:
      - platform: numeric_state
        entity_id: !input power_sensor
        below: !input finishing_threshold
        for:
          minutes: !input finishing_hysteresis

  # Licht einschalten
  - service: light.turn_on
    target:
      entity_id: !input light_entity
    data:
      rgb_color: !input light_color
      brightness_pct: !input light_brightness
      transition: 1

  # Benachrichtigungen
  - choose: []
    default: !input notification_actions

  # Licht Auto-Aus
  - if:
      - condition: template
        value_template: "{{ light_duration_minutes | int(0) > 0 }}"
    then:
      - delay:
          minutes: !input light_duration_minutes
      - service: light.turn_off
        target:
          entity_id: !input light_entity
        data:
          transition: 2

mode: single
max_exceeded: silent
