blueprint:
  name: "⚡ Smart Device Finished – Power Sensor PRO"
  description: >
    **Waschmaschine/Spülmaschine fertig → Intelligente Benachrichtigungen & Licht**
    
    Erkennt wenn Geräte fertig sind über Stromverbrauch (Watt) – perfekt für Smart Plugs!
    
    🔔 Intelligente Benachrichtigungen - Telegram, HA Companion App, Alexa, oder Custom
    💡 Licht-Integration - Farbkreis mit konfigurierbarer Dauer
    ⚡ Power-Sensor basiert - Erkennt Start & Ende automatisch
    👥 Presence Awareness - Nur zuhause benachrichtigen
    🔄 Multi-Device Ready - Für alle Smart Plugs
    🎛️ 100% UI-konfigurierbar - Keine YAML-Bearbeitung
    🔒 Produktionsreif - Getestet mit echten Geräten
    
  domain: automation
  source_url: https://github.com/yourusername/smart-home-blueprints
  
  input:
    #################################################
    # POWER SENSOR KONFIGURATION
    #################################################
    power_sensor:
      name: "⚡ Power Sensor"
      description: "Stromverbrauch Sensor (z.B. von Sonoff, Shelly, TP-Link)"
      selector:
        entity:
          domain: sensor
          device_class: power
    
    #################################################
    # START-SCHWELLE
    #################################################
    starting_threshold:
      name: "⚡ Start-Schwelle (Watt)"
      description: "Stromverbrauch ab dem Gerät als 'gestartet' gilt"
      default: 5
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "W"
          mode: slider
          step: 1
    
    starting_hysteresis:
      name: "⏱️ Start-Hysterese"
      description: "Wie lange über Schwelle, bevor Start erkannt wird?"
      default: 1
      selector:
        number:
          min: 0.25
          max: 60
          unit_of_measurement: "min"
          mode: slider
          step: 0.25
    
    #################################################
    # END-SCHWELLE
    #################################################
    finishing_threshold:
      name: "⚡ End-Schwelle (Watt)"
      description: "Stromverbrauch unter dem Gerät als 'fertig' gilt"
      default: 5
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "W"
          mode: slider
          step: 1
    
    finishing_hysteresis:
      name: "⏱️ End-Hysterese"
      description: "Wie lange unter Schwelle, bevor Fertig erkannt wird?"
      default: 5
      selector:
        number:
          min: 0.25
          max: 60
          unit_of_measurement: "min"
          mode: slider
          step: 0.25
    
    #################################################
    # PRESENCE AWARENESS
    #################################################
    presence_awareness:
      name: "👥 Presence Awareness aktivieren"
      description: "Nur Benachrichtigungen wenn jemand zuhause ist?"
      default: false
      selector:
        boolean:
    
    presence_entity:
      name: "🏠 Presence Entity"
      description: "Entity die angibt ob jemand zuhause ist (z.B. group.all_people)"
      default: ""
      selector:
        entity:
          domain: [group, binary_sensor, person]
    
    presence_state:
      name: "✅ 'Zu Hause' = Zustand"
      description: "Bei welchem Zustand gilt Person als zu Hause?"
      default: "home"
      selector:
        text:
    
    #################################################
    # LICHT-INTEGRATION
    #################################################
    enable_light:
      name: "💡 Licht-Integration aktivieren"
      description: "Soll ein Licht bei Fertig-Signal einschalten?"
      default: false
      selector:
        boolean:
    
    light_entity:
      name: "💡 Licht Entity"
      description: "Welches Licht soll einschalten?"
      default: ""
      selector:
        entity:
          domain: light
    
    light_color:
      name: "🌈 Licht-Farbe"
      description: "Wähle die Farbe aus dem Farbkreis"
      default: [255, 100, 0]
      selector:
        color_rgb:
    
    light_brightness:
      name: "☀️ Helligkeit"
      description: "Helligkeit in Prozent"
      default: 100
      selector:
        number:
          min: 10
          max: 100
          unit_of_measurement: "%"
          mode: slider
    
    light_duration_minutes:
      name: "⏱️ Licht Dauer"
      description: "Wie lange soll Licht leuchten? (0 = bleibt an)"
      default: 0
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: "min"
          mode: slider
    
    #################################################
    # BENACHRICHTIGUNGEN
    #################################################
    notification_actions:
      name: "🔔 Benachrichtigungen"
      description: "Aktionen wenn Gerät fertig ist (Telegram, HA App, Alexa, etc.)"
      selector:
        action: {}

#################################################
# TRIGGER: GERÄT STARTET (über Schwelle)
#################################################
trigger:
  - platform: numeric_state
    entity_id: !input power_sensor
    above: !input starting_threshold
    for:
      minutes: !input starting_hysteresis
    id: "appliance_started"

#################################################
# BEDINGUNG: Keine zusätzlichen
#################################################
condition: []

#################################################
# AKTIONEN
#################################################
action:
  # Warte bis Gerät fertig ist (unter Schwelle)
  - wait_for_trigger:
      - platform: numeric_state
        entity_id: !input power_sensor
        below: !input finishing_threshold
        for:
          minutes: !input finishing_hysteresis

  # Jetzt: Gerät ist fertig! Presence Check
  - condition: or
    conditions:
      # Wenn Presence Awareness NICHT aktiviert
      - condition: template
        value_template: "{{ not (presence_awareness | bool) }}"
      # Oder wenn aktiviert UND jemand zu Hause ist
      - condition: and
        conditions:
          - condition: template
            value_template: "{{ presence_awareness | bool }}"
          - condition: state
            entity_id: !input presence_entity
            state: !input presence_state

  # LICHT einschalten (wenn aktiviert)
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_light | bool and light_entity != '' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              rgb_color: !input light_color
              brightness_pct: !input light_brightness
              transition: 1

  # BENACHRICHTIGUNGEN senden (User-definiert)
  - choose: []
    default: !input notification_actions

  # LICHT AUTO-AUSSCHALTEN (nach Dauer)
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_light | bool and light_duration_minutes > 0 }}"
        sequence:
          - delay:
              minutes: !input light_duration_minutes
          - service: light.turn_off
            target:
              entity_id: !input light_entity
            data:
              transition: 2

mode: single
max_exceeded: silent
